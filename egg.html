		<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>

		<script>
			$(document).ready(function() {
				var egg = document.getElementById("eggs");
				while ($(window).height() > $("#eggs").height()) {
					egg.innerHTML += "egg ".repeat(1000);
				}
				$(window).scroll(function() {
					if ($(document).scrollTop() + $(window).height() + 10 > $("#eggs").height()) {
						egg.innerHTML += "egg ".repeat(1000);
					}
				});
			});
		</script>

		<div class="egg">
			<p id="eggs">
				egg 
			</p>
