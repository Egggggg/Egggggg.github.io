<!DOCTYPE html>
<html>
	<head>
		<title>Egg</title>
		<link rel="stylesheet" type="text/css" href="css/main/sidebar.css">
		<link rel="stylesheet" type="text/css" href="css/main/main.css">
		<link rel="shortcut icon" type="image/png" href="img/favicon.png">
	</head>

	<body>
		
		<div class="sidebar">
			<ul>
				<li><a href="index.html">Home</a></li>
				<li><a class="active">Egg</a></li>
			</ul>
			<div id="heretics">
				<h1>ALERT</h1>
				<p>
					THERE IS HALF AN EGG MISSING SOMEWHERE
				</p>
			</div>
		</div>
		<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>

		<script>
			$(document).ready(function() {
				var egg = document.getElementById("eggs");
				var special = Math.floor(Math.random() * 10001);
				var half = Math.floor(Math.random() * 1000001);

				while ($(window).height() > $("#eggs").height()) {
					special = Math.floor(Math.random() * 10001);
					half = Math.floor(Math.random() * 10000001);

					if (special == 1) {
						var a = document.createElement("a");
						a.setAttribute("href", "secret.html");
						a.setAttribute("class", "secret");
						a.innerHTML = "egg ";
						egg.append(a);
					}
					if (half == 1) {
						var a = document.createElement("p");
						a.innerHTML = "eg  ";
						egg.append(a);
					}
					egg.innerHTML += "egg ".repeat(1000);
				}
				$(window).scroll(function() {
					special = Math.floor(Math.random() * 100);
					
					if (special == 1) {
						var a = document.createElement("a");
						a.setAttribute("href", "secret.html");
						a.setAttribute("class", "secret");
						a.innerHTML = "egg ";
						egg.append(a)
					}
					if ($(document).scrollTop() + $(window).height() + 10 > $("#eggs").height()) {
						egg.innerHTML += "egg ".repeat(1000);
					}
				});
			});
		</script>

		<div class="egg">
			<p id="eggs">
				egg 
			</p>
		</div>
	</body>
</html>
